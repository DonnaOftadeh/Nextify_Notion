<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nextify • Founder – Company</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"; }
    .label-required::after { content: " *"; color: #ef4444; font-weight: 600; margin-left: 2px; }
    input::placeholder, textarea::placeholder, select:invalid { color: #9ca3af; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white shadow-sm">
    <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="text-xl font-bold text-blue-700">Nextify</a>
      <a href="roles.html" class="text-sm text-gray-600 hover:text-blue-600">← Back to roles</a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-10">
    <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-2">Founder • Benchmark a Company</h1>
    <p class="text-gray-600 mb-8">Tell us the company you want to benchmark against. We’ll use your input to guide the multi-agent analysis.</p>

    <form id="founder-form" data-journey="company" class="bg-white rounded-2xl shadow p-6 md:p-8 space-y-6">
      <div class="p-4 mb-4 bg-blue-50 border-l-4 border-blue-400 rounded">
        <p class="text-sm text-blue-700">Submissions for this journey are coming soon.</p>
      </div>
      <!-- Benchmark company -->
      <div>
        <label for="company_name" class="block text-sm font-semibold text-gray-800 label-required">Benchmark company</label>
        <input
          id="company_name"
          name="company_name"
          type="text"
          required
          placeholder="e.g., Spotify"
          class="mt-2 block w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>

      <!-- Region -->
      <div>
        <label for="region" class="block text-sm font-semibold text-gray-800 label-required">Target region(s)</label>
        <input
          id="region"
          name="region"
          type="text"
          required
          placeholder="e.g., Global; North America"
          class="mt-2 block w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        />
      </div>

      <div class="pt-2 flex flex-col items-center gap-4">
        <p class="text-gray-700">Submissions for this journey are coming soon.</p>
        <div class="flex items-center gap-3">
          <a href="roles.html"
             class="inline-flex justify-center px-5 py-3 rounded-full border border-gray-300 text-gray-700 hover:bg-gray-50">
            Back
          </a>
          <a href="founder-idea.html"
             class="inline-flex justify-center px-6 py-3 rounded-full bg-blue-600 text-white font-semibold hover:bg-blue-700 focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Go to idea form
          </a>
        </div>
      </div>
    </form>
  </main>
</body>
</html>
